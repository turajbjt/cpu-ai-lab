services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  bootstrap_models:
    build: ./bootstrap_models
    container_name: bootstrap_models
    restart: unless-stopped

  multi_agent_lab:
    build: ./multi_agent_lab
    container_name: multi_agent_lab
    depends_on:
      - bootstrap_models
      - qdrant
    restart: unless-stopped

  multi_agent_webui:
    build: ./multi_agent_webui
    container_name: multi_agent_webui
    ports:
      - "3005:80"
    depends_on:
      - multi_agent_lab
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    command: /bin/ollama serve
    ports:
      - "11434:11434"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    restart: unless-stopped

