version: "3.9"

services:
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      - MODEL=${MODEL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/v1/models"]
      interval: 5s
      retries: 12
    restart: unless-stopped

  bootstrap_models:
    image: ollama/ollama:latest
    container_name: bootstrap_models
    depends_on:
      - ollama
    entrypoint: >
      /bin/sh -c "
      echo '⬇ Bootstrapping Ollama models...';
      until curl -s http://ollama:11434/api/tags >/dev/null; do
        sleep 2;
      done;
      for model in phi3 mistral codellama nomic-embed-text; do
        if curl -s http://ollama:11434/api/tags | grep -q \$model; then
          echo '✔ \$model already installed';
        else
          echo '⬇ Pulling \$model';
          ollama pull \$model;
        fi;
      done;
      echo '✅ Model bootstrap complete';
      "
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ollama:11434/v1/models | grep -E 'phi3|mistral|codellama|nomic-embed-text'"]
      interval: 10s
      retries: 12

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      bootstrap_models:
        condition: service_healthy
    volumes:
      - openwebui:/app/backend/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      retries: 12
    restart: unless-stopped

  flowise:
    image: flowiseai/flowise
    container_name: flowise
    ports:
      - "3001:3000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      bootstrap_models:
        condition: service_healthy
    volumes:
      - flowise:/root/.flowise
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 5s
      retries: 12
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/collections"]
      interval: 5s
      retries: 12
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n:/home/node/.n8n
    restart: unless-stopped

volumes:
  ollama:
  openwebui:
  flowise:
  qdrant:
  n8n:
